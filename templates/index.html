<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to SQL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --black: #ededed;
            --white: #0a0a0a;
            --grey: #9a9a9a;
            --line: #2a2a2a;
            --fail: #ff5c6c;
            --code-bg: #1a1a1a;
}

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Mulish', sans-serif;
            background: var(--white);
            color: var(--black);
            line-height: 1.6;
            padding: 60px 24px;
            max-width: 820px;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px solid var(--black);
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        h1 { font-weight: 900; font-size: 2.4rem; letter-spacing: -0.02em; }

        header p { color: var(--grey); font-weight: 400; margin-top: 6px; font-size: 0.95rem; }

        .input-row { display: flex; gap: 12px; margin-bottom: 16px; }

        #question {
            flex: 1;
            font-family: 'Mulish', sans-serif;
            font-size: 1rem;
            padding: 16px 18px;
            border: 2px solid var(--black);
            background: var(--white);
            color: var(--black);
            outline: none;
        }

        #question::placeholder { color: var(--grey); }
        #question:focus { background: #141414; }

        button {
            font-family: 'Mulish', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            padding: 0 32px;
            border: 2px solid var(--black);
            background: var(--black);
            color: var(--white);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        button:hover { background: var(--white); color: var(--black); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .hint { color: var(--grey); font-size: 0.85rem; margin-bottom: 40px; }

        #output { margin-top: 20px; }

        .meta {
            font-size: 0.85rem;
            color: var(--grey);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 16px;
        }

        .provider-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 2px 7px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .provider-tag.local  { border: 1px solid #3a3a3a; color: #666; }
        .provider-tag.claude { border: 1px solid #4a4a4a; color: #888; }

        .attempt {
            border-left: 3px solid var(--line);
            padding: 12px 0 12px 20px;
            margin-bottom: 14px;
        }

        .attempt.ok   { border-left-color: var(--black); }
        .attempt.fail { border-left-color: var(--fail); }

        .attempt-label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .attempt.fail .attempt-label { color: var(--fail); }

        .sql {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: var(--code-bg);
            padding: 10px 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .error-msg { color: var(--fail); font-size: 0.85rem; margin-top: 8px; }

        /* ---- Results table ---- */
        .results { margin-top: 28px; }

        .results h3 {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--black);
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }

        th { font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.06em; }
        td { font-weight: 400; }

        .final-fail {
            border: 2px solid var(--fail);
            color: var(--fail);
            padding: 16px;
            font-weight: 600;
            margin-top: 20px;
        }

        .loading { color: var(--grey); font-style: italic; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .loading { animation: blink 1.2s infinite; }
    </style>
</head>
<body>

    <header>
        <h1>Text to SQL</h1>
        <p>Tries 3 times with a local model. If all fail, attempt 4 uses Claude API.</p>
    </header>

    <div class="input-row">
        <input
            type="text"
            id="question"
            placeholder="e.g. How many heads are older than 56?"
            autocomplete="off"
        >
        <button id="runBtn" onclick="runQuery()">Run</button>
    </div>
    <p class="hint">The right database is detected automatically.</p>

    <div id="output"></div>

    <script>
        const input  = document.getElementById("question");
        const button = document.getElementById("runBtn");
        const output = document.getElementById("output");

        // Append an entry to the log stored in localStorage
        const LS_KEY = "text_to_sql_log";

        function lsAppend(entry) {
            const log = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
            log.push({ time: new Date().toISOString(), ...entry });
            localStorage.setItem(LS_KEY, JSON.stringify(log, null, 2));
        }

        // ---- input / output ----
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") runQuery();
        });

        async function runQuery() {
            const question = input.value.trim();
            if (!question) return;

            button.disabled = true;
            output.innerHTML = '<p class="loading">Running pipeline…</p>';

            const payload = { question };
            lsAppend({ event: "query sent", question });

            try {
                const res  = await fetch("/query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                lsAppend({
                    event:    "query result",
                    question: data.question,
                    database: data.database,
                    success:  data.success,
                    attempts: data.attempts.map(a => ({
                        attempt:  a.attempt,
                        provider: a.provider,
                        success:  a.success,
                        sql:      a.sql,
                        error:    a.error || null,
                    })),
                    final_error: data.final_error || null,
                });
                render(data);
            } catch (err) {
                lsAppend({ event: "error", question, error: String(err) });
                output.innerHTML = '<div class="final-fail">Something went wrong: ' + err + '</div>';
            } finally {
                button.disabled = false;
            }
        }

        function render(data) {
            let html = '<p class="meta">Database detected: ' + escapeHtml(data.database) + '</p>';

            data.attempts.forEach(a => {
                const cls   = a.success ? "ok" : "fail";
                const label = a.success
                    ? "Attempt " + a.attempt + " — success"
                    : "Attempt " + a.attempt + " — failed";
                const providerLabel = a.provider === "claude"
                    ? '<span class="provider-tag claude">Claude API</span>'
                    : '<span class="provider-tag local">Local (Ollama)</span>';

                html += '<div class="attempt ' + cls + '">';
                html += '<div class="attempt-label">' + label + providerLabel + '</div>';
                html += '<div class="sql">' + escapeHtml(a.sql) + '</div>';
                if (!a.success && a.error) {
                    html += '<div class="error-msg">' + escapeHtml(a.error) + '</div>';
                }
                html += '</div>';
            });

            if (data.success) {
                html += '<div class="results">';
                html += '<h3>Results</h3>';
                html += '<table><tr>';
                data.columns.forEach(c => { html += '<th>' + escapeHtml(c) + '</th>'; });
                html += '</tr>';
                data.data.forEach(row => {
                    html += '<tr>';
                    row.forEach(cell => { html += '<td>' + escapeHtml(String(cell ?? "")) + '</td>'; });
                    html += '</tr>';
                });
                html += '</table></div>';

            } else {
                html += '<div class="final-fail">Failed after all attempts. Last error: '
                      + escapeHtml(data.final_error) + '</div>';
            }

            output.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

</body>
</html>
